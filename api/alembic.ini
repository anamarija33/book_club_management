[alembic]
script_location = alembic
prepend_sys_path = .
# URL se postavlja programski u env.py iz settings objekta.
# Ova vrijednost je samo fallback — nikad se ne koristi u praksi.
sqlalchemy.url = postgresql+asyncpg://bc_user:bc_pass@localhost:5432/bookclub

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
